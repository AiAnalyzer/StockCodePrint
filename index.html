<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ai-Analyzer : Diamonds Print</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f6f8;
}
.container{
  width:90%;
  text-align:center;
}
h1{
  font-size:26px;
  margin-bottom:30px;
}
input{
  width:100%;
  padding:15px;
  font-size:18px;
  margin-bottom:20px;
}
button{
  width:100%;
  padding:15px;
  margin:10px 0;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#1976d2;
  color:white;
}
</style>
</head>

<body>

<div class="container">
<h1>Ai-Analyzer : Diamonds Print</h1>

<input id="user" placeholder="Enter User Name">

<button onclick="goQuick()">Quick Mode</button>
<button onclick="goBatch()">Batch Mode</button>
</div>

<script>
window.onload=()=>{
 let u=localStorage.getItem("user");
 if(u) user.value=u;
};

function save(){
 localStorage.setItem("user",user.value);
}

function goQuick(){ save(); location.href="quick.html"; }
function goBatch(){ save(); location.href="batch.html"; }
</script>

</body>
</html>
