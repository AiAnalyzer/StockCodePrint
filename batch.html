<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batch Mode</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family: Arial; background:#fafafa; text-align:center; }
#qr { font-size:20px; font-weight:bold; }
input { font-size:22px; padding:10px; width:80%; }
button {
  padding:12px;
  margin:5px;
  border:none;
  background:#1976d2;
  color:white;
}
table { width:100%; margin-top:10px; }
td, th { padding:5px; border-bottom:1px solid #ccc; }
</style>
</head>

<body>

<button onclick="location.href='index.html'">⬅ Back</button>

<div id="reader"></div>
<div id="qr">Scan QR...</div>

<input id="weight" placeholder="0.00">

<button onclick="save()">Save + Print</button>

<table id="list">
<tr><th>QR</th><th>CT</th></tr>
</table>

<h3 id="total">Total: 0</h3>

<script>
let qr="", batch=[];

new Html5Qrcode("reader").start(
 {facingMode:"environment"},
 {fps:10,qrbox:250},
 txt=>{
   qr=txt;
   document.getElementById("qr").innerText=txt;
 }
);

function save(){
 if(!qr || !weight.value) return;

 batch.push({qr:qr, w:weight.value});
 update();

 let w=window.open("");
 w.document.write(`<h2>${qr}</h2><h1>${weight.value} CT</h1>`);
 w.print();

 weight.value="";
}

function update(){
 let t=document.getElementById("list");
 t.innerHTML="<tr><th>QR</th><th>CT</th></tr>";

 let total=0;

 batch.forEach(i=>{
  t.innerHTML+=`<tr><td>${i.qr}</td><td>${i.w}</td></tr>`;
  total+=parseFloat(i.w);
 });

 document.getElementById("total").innerText="Total: "+total.toFixed(2);
}
</script>

</body>
</html>
