<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batch Mode Voice</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;display:flex;flex-direction:column;height:100vh}

#top{flex:1;background:#000;color:#fff}
#reader{height:80%}
#qr{padding:5px;font-size:14px}

#middle{text-align:center;background:#f4f4f4}
input{font-size:28px;width:90%;padding:10px;text-align:center}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px}
.keypad button{padding:12px;font-size:18px}

#listArea{flex:1;overflow:auto}
table{width:100%;font-size:12px}
</style>
</head>

<body>

<div id="top">
<button onclick="location.href='index.html'">⬅ Back</button>
<div id="reader"></div>
<div id="qr">Scan QR...</div>
</div>

<div id="middle">
<input id="weight" readonly placeholder="0.00">
</div>

<div id="listArea">
<table id="list">
<tr><th>QR</th><th>CT</th></tr>
</table>
<h3 id="total">Total: 0</h3>
</div>

<script>
let qr="", batch=[];

// 🔊 Speak
function speak(text, cb){
 let u=new SpeechSynthesisUtterance(text);
 u.onend=()=>cb && cb();
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

// 🔔 Beep
function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),120);
}

// 🎤 Listen
function listen(callback){
 let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();

 rec.onresult=(e)=>{
   let t=e.results[0][0].transcript.toLowerCase();
   callback(t);
 };
}

// Convert speech → number
function parseWeight(t){
 t=t.replace(/one/gi,"1").replace(/two/gi,"2")
    .replace(/three/gi,"3").replace(/four/gi,"4")
    .replace(/five/gi,"5").replace(/six/gi,"6")
    .replace(/seven/gi,"7").replace(/eight/gi,"8")
    .replace(/nine/gi,"9").replace(/zero/gi,"0")
    .replace(/point/gi,".");

 return parseFloat(t).toFixed(2);
}

// 🔄 FULL FLOW
function startFlow(){

 // Speak QR
 let parts=qr.split("|");
 speak(parts.join(" "), ()=>{

   // Beep → listen weight
   beep();

   listen(txt=>{
     let w=parseWeight(txt);
     weight.value=w;

     // Confirm weight
     speak(w+" carat", ()=>{

       // Listen for OK
       listen(confirm=>{
         if(confirm.includes("ok") || confirm.includes("okay")){
           saveAndPrint(w);
         } else {
           speak("Repeat weight");
         }
       });

     });

   });

 });
}

// Save + Print
function saveAndPrint(w){
 batch.push({qr:qr,w:w});
 update();

 let p=qr.split("|");

 let win=window.open("");
 win.document.write(`
 <div style="text-align:center">
 <h2>${p[0]}</h2>
 <div>${p.slice(1,3).join("|")}</div>
 <h1>${w} CT</h1>
 </div>
 `);
 win.print();

 weight.value="";
}

// Update table
function update(){
 let t=document.getElementById("list");
 t.innerHTML="<tr><th>QR</th><th>CT</th></tr>";

 let total=0;

 batch.forEach(i=>{
  t.innerHTML+=`<tr><td>${i.qr}</td><td>${i.w}</td></tr>`;
  total+=parseFloat(i.w);
 });

 totalEl.innerText="Total: "+total.toFixed(2);
}

// Scanner
new Html5Qrcode("reader").start(
 {facingMode:"environment"},
 {fps:10,qrbox:200},
 txt=>{
   qr=txt;
   qrText.innerText=txt;

   startFlow(); // AUTO START
 }
);
</script>

</body>
</html>
