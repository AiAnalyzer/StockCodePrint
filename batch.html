<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batch Mode</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;display:flex;flex-direction:column;height:100vh}
#top{flex:1;background:#000;color:#fff}
#reader{height:80%}
#qr{padding:5px}
#middle{text-align:center;background:#f4f4f4}
input{font-size:26px;width:90%;padding:10px}
#listArea{flex:1;overflow:auto}
table{width:100%;font-size:12px}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<div id="top">
<button onclick="location.href='index.html'">⬅ Back</button>

<button onclick="startApp()" style="background:green;color:white;width:95%">
START SYSTEM
</button>

<div id="reader"></div>
<div id="qr">Scan QR...</div>
</div>

<div id="middle">
<input id="weight" readonly placeholder="0.00">
</div>

<div id="listArea">
<table id="list"><tr><th>QR</th><th>CT</th></tr></table>
<h3 id="total">Total: 0</h3>
</div>

<script>
let qr="",batch=[],scanner;

// speak
function speak(t,cb){
 let u=new SpeechSynthesisUtterance(t);
 u.onend=()=>cb&&cb();
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

// beep
function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

// listen
function listen(cb){
 let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();
 rec.onresult=e=>cb(e.results[0][0].transcript.toLowerCase());
}

// parse
function parseWeight(t){
 t=t.replace(/one/gi,"1").replace(/two/gi,"2")
 .replace(/three/gi,"3").replace(/four/gi,"4")
 .replace(/five/gi,"5").replace(/six/gi,"6")
 .replace(/seven/gi,"7").replace(/eight/gi,"8")
 .replace(/nine/gi,"9").replace(/zero/gi,"0")
 .replace(/point/gi,".");
 return parseFloat(t).toFixed(2);
}

// start system
function startApp(){
 let ctx=new AudioContext();
 ctx.resume();

 speak("System ready");

 scanner=new Html5Qrcode("reader");

 scanner.start(
  {facingMode:"environment"},
  {fps:10,qrbox:200},
  txt=>{
   qr=txt;
   qrText.innerText=txt;

   startFlow();
  }
 );
}

// flow
function startFlow(){
 let parts=qr.split("|");

 speak(parts.join(" "),()=>{
  beep();

  listen(txt=>{
   let w=parseWeight(txt);
   weight.value=w;

   speak(w+" carat",()=>{
    savePrint(w);
   });

  });

 });
}

// save + print
function savePrint(w){
 batch.push({qr:qr,w:w});
 update();

 let p=qr.split("|");

 let win=window.open("");
 win.document.write(`
 <div style="text-align:center">
 <h2>${p[0]}</h2>
 <div>${p.slice(1,3).join("|")}</div>
 <h1>${w} CT</h1>
 </div>
 `);
 win.print();
}

// update
function update(){
 let t=list;
 t.innerHTML="<tr><th>QR</th><th>CT</th></tr>";
 let total=0;

 batch.forEach(i=>{
  t.innerHTML+=`<tr><td>${i.qr}</td><td>${i.w}</td></tr>`;
  total+=parseFloat(i.w);
 });

 totalEl.innerText="Total: "+total.toFixed(2);
}
</script>

</body>
</html>
