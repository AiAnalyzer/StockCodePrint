<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Batch Mode</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TOP */
#top{
  flex:1;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
}

#reader{
  flex:1;
}

#qr{
  padding:5px;
  font-size:14px;
  background:#111;
}

/* MIDDLE */
#middle{
  background:#f4f4f4;
  text-align:center;
}

input{
  font-size:28px;
  width:90%;
  padding:10px;
  margin:5px;
  text-align:center;
}

/* KEYPAD */
.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:6px;
}

.keypad button{
  font-size:20px;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#e0e0e0;
}

.keypad button:active{
  background:#bdbdbd;
}

/* ACTION BUTTON */
.action{
  background:#1976d2;
  color:#fff;
}

/* LIST */
#listArea{
  flex:1;
  overflow:auto;
  background:#fff;
}

table{
  width:100%;
  font-size:12px;
  border-collapse:collapse;
}

th,td{
  padding:6px;
  border-bottom:1px solid #ccc;
}

#total{
  padding:8px;
  background:#fafafa;
}
</style>
</head>

<body>

<!-- TOP -->
<div id="top">
<button onclick="location.href='index.html'">⬅ Back</button>
<div id="reader"></div>
<div id="qr">Scan QR...</div>
</div>

<!-- MIDDLE -->
<div id="middle">
<input id="weight" readonly placeholder="0.00">

<div class="keypad">
<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('.')">.</button>
<button onclick="add('0')">0</button>
<button onclick="del()">⌫</button>

<button onclick="clearW()">C</button>
<button class="action" style="grid-column:span 2;" onclick="save()">SAVE + PRINT</button>
</div>

<button class="action" style="width:95%;margin:5px;" onclick="exportPDF()">EXPORT PDF</button>
</div>

<!-- LIST -->
<div id="listArea">
<table id="list">
<tr><th>QR</th><th>CT</th></tr>
</table>

<h3 id="total">Total: 0.00 | Items: 0</h3>
</div>

<script>
let qr="", batch=[];

// Scanner
new Html5Qrcode("reader").start(
 {facingMode:"environment"},
 {fps:10,qrbox:200},
 txt=>{
   qr=txt;
   document.getElementById("qr").innerText=txt;
   weight.focus();
 }
);

// Keypad
function add(n){
 if(n==="." && weight.value.includes(".")) return;
 weight.value+=n;
}

function del(){
 weight.value=weight.value.slice(0,-1);
}

function clearW(){
 weight.value="";
}

// Save + Print
function save(){
 if(!qr || !weight.value) return;

 batch.push({qr:qr,w:weight.value});
 update();

 let p=qr.split("|");

 let win=window.open("");
 win.document.write(`
 <div style="text-align:center">
 <h2>${p[0]}</h2>
 <div>${p.slice(1,3).join("|")}</div>
 <h1>${weight.value} CT</h1>
 </div>
 `);
 win.print();

 weight.value="";
}

// Update Table
function update(){
 let t=document.getElementById("list");
 t.innerHTML="<tr><th>QR</th><th>CT</th></tr>";

 let total=0;

 batch.forEach(i=>{
  t.innerHTML+=`<tr><td>${i.qr}</td><td>${i.w}</td></tr>`;
  total+=parseFloat(i.w);
 });

 document.getElementById("total").innerText=
  "Total: "+total.toFixed(2)+" | Items: "+batch.length;
}

// Export PDF
function exportPDF(){
 let user=localStorage.getItem("user")||"";
 let date=new Date().toLocaleString();

 let html=`<h2>Diamond Batch</h2>
 <p>User: ${user}</p>
 <p>Date: ${date}</p>
 <table border="1" width="100%">
 <tr><th>QR</th><th>CT</th></tr>`;

 batch.forEach(i=>{
   html+=`<tr><td>${i.qr}</td><td>${i.w}</td></tr>`;
 });

 let total=batch.reduce((a,b)=>a+parseFloat(b.w),0);

 html+=`</table><h3>Total: ${total.toFixed(2)}</h3>`;

 let win=window.open("");
 win.document.write(html);
 win.print();
}
</script>

</body>
</html>
