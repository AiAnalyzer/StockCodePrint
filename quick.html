<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Mode</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;display:flex;flex-direction:column;height:100vh}
#top{flex:1;background:#000;color:#fff}
#reader{height:80%}
#qr{padding:5px;font-size:14px}

#bottom{flex:1;text-align:center;background:#f4f4f4}
input{font-size:30px;width:90%;padding:10px;text-align:center}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px}
.keypad button{font-size:20px;padding:15px}
.action{background:#1976d2;color:#fff}
</style>
</head>

<body>

<div id="top">
<button onclick="location.href='index.html'">⬅</button>
<div id="reader"></div>
<div id="qr">Scan QR...</div>
</div>

<div id="bottom">
<input id="weight" readonly placeholder="0.00">

<div class="keypad">
<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('.')">.</button>
<button onclick="add('0')">0</button>
<button onclick="del()">⌫</button>
<button onclick="clearW()">C</button>
<button class="action" style="grid-column:span 2;" onclick="print()">PRINT</button>
</div>
</div>

<script>
let qr="";

// Speak
function speak(t){
 speechSynthesis.cancel();
 speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// Beep
function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),100);
}

// Voice input
function listen(){
 let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();

 rec.onresult=(e)=>{
   let t=e.results[0][0].transcript
   .replace(/one/gi,"1").replace(/two/gi,"2")
   .replace(/three/gi,"3").replace(/four/gi,"4")
   .replace(/five/gi,"5").replace(/point/gi,".");

   t=parseFloat(t).toFixed(2);
   weight.value=t;

   speak(t+" carat");

   setTimeout(print,800);
 };
}

// Scan
new Html5Qrcode("reader").start(
 {facingMode:"environment"},
 {fps:10,qrbox:200},
 txt=>{
   qr=txt;
   qrText.innerText=txt;

   let parts=txt.split("|");

   speak(parts.join(" "));
   setTimeout(()=>{
     beep();
     listen();
   },1200);
 }
);

function add(n){ if(n==="."&&weight.value.includes("."))return; weight.value+=n; }
function del(){ weight.value=weight.value.slice(0,-1); }
function clearW(){ weight.value=""; }

// Print
function print(){
 if(!qr||!weight.value) return;

 let p=qr.split("|");

 let w=window.open("");
 w.document.write(`
 <div style="text-align:center">
 <h2>${p[0]}</h2>
 <div>${p.slice(1,3).join("|")}</div>
 <h1>${weight.value} CT</h1>
 </div>
 `);
 w.print();
}
</script>

</body>
</html>
