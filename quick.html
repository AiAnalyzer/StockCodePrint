<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Mode</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* TOP */
#top{
  flex:1;
  background:#000;
  color:#fff;
}

#reader{
  height:80%;
}

#qr{
  padding:5px;
  font-size:14px;
}

/* BOTTOM */
#bottom{
  flex:1;
  background:#f4f4f4;
  text-align:center;
}

input{
  font-size:30px;
  width:90%;
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="top">
<button onclick="location.href='index.html'">⬅ Back</button>
<div id="reader"></div>
<div id="qr">Scan QR...</div>
</div>

<div id="bottom">
<input id="weight" readonly placeholder="0.00">
</div>

<script>
let qr="";

// 🔊 Speak
function speak(text, cb){
 let u=new SpeechSynthesisUtterance(text);
 u.onend=()=>cb && cb();
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

// 🔔 Beep
function beep(){
 let ctx=new AudioContext();
 let o=ctx.createOscillator();
 o.connect(ctx.destination);
 o.start();
 setTimeout(()=>o.stop(),120);
}

// 🎤 Listen
function listen(callback){
 let rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();

 rec.onresult=(e)=>{
   let t=e.results[0][0].transcript.toLowerCase();
   callback(t);
 };
}

// Convert speech → number
function parseWeight(t){
 t=t.replace(/one/gi,"1").replace(/two/gi,"2")
    .replace(/three/gi,"3").replace(/four/gi,"4")
    .replace(/five/gi,"5").replace(/six/gi,"6")
    .replace(/seven/gi,"7").replace(/eight/gi,"8")
    .replace(/nine/gi,"9").replace(/zero/gi,"0")
    .replace(/point/gi,".");

 return parseFloat(t).toFixed(2);
}

// 🚀 FULL AUTO FLOW
function startFlow(){

 let parts=qr.split("|");

 // Speak QR
 speak(parts.join(" "), ()=>{

   // Beep → listen weight
   beep();

   listen(txt=>{
     let w=parseWeight(txt);
     weight.value=w;

     // Speak confirmation
     speak(w+" carat", ()=>{

       // AUTO PRINT (no OK step)
       print(w);

     });

   });

 });
}

// Print
function print(w){
 if(!qr || !w) return;

 let p=qr.split("|");

 let win=window.open("");
 win.document.write(`
 <div style="text-align:center">
 <h2>${p[0]}</h2>
 <div>${p.slice(1,3).join("|")}</div>
 <h1>${w} CT</h1>
 </div>
 `);
 win.print();
}

// Scanner
new Html5Qrcode("reader").start(
 {facingMode:"environment"},
 {fps:10,qrbox:200},
 txt=>{
   qr=txt;
   qrText.innerText=txt;

   startFlow(); // auto start
 }
);
</script>

</body>
</html>
